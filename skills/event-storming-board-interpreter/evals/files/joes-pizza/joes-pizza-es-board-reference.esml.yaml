    origin:
      source: src-001
      bbox: [745, 80, 205, 110]
      color_observed: "#F8BBD0"
      text_confidence: 0.95

# =============================================================================
# CONFIDENCE
# =============================================================================

confidence_defaults:
  overall_text_extraction: 0.90
  overall_classification: 0.88
  notes: >
    Real Miro board photograph (not a synthetic SVG). Text is generally
    legible but some stickies are slightly rotated and overlapping.
    The organic layout means elements are not aligned to a strict grid.
    Aggregates are positioned at the bottom of zones (floating) rather
    than inline in the canonical design-level command→aggregate→event
    flow, which reduces classification confidence slightly for
    aggregate identification. Actor stickies are duplicated liberally
    (4 Customer stickies in Orders, 3 Pizza Chef stickies in Kitchen)
    to show proximity to the commands they initiate. No policies,
    read models, hotspots, or unresolved items are visible on the
    board, though the transcripts discuss policies (delivery radius,
    topping constraints) that were deferred to future sessions.
