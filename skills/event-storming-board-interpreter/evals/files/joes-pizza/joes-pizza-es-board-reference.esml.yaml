      Joe: "Credit card machine, which we can enter in or whatever.
      Or if they want to pay through PIX, we'll take that too." The
      payment is then processed by the external Payment System.
    origin:
      source: src-001
      bbox: [575, 425, 165, 120]
      color_observed: "#4FC3F7"
      text_confidence: 0.91

  # --- Kitchen zone ---
