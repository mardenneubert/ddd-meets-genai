      items (item + quantity), type, topping, price, delivery
      instructions. This aggregate appears in all three zones.
    origin:
      source: src-001
      bbox: [640, 680, 210, 120]
      color_observed: "#FFD700"
      text_confidence: 0.96

  - id: agg-order-kitchen
    name: "Order"
    group: grp-kitchen
    notes: >
      Duplicate Order aggregate in the Kitchen zone. The transcript
      clarifies: "the kitchen mostly needs early on just the order"
      and "they don't care who it's for and we don't care where it
      goes — we just need to know what kind of order."
    origin:
      source: src-001
      bbox: [1990, 510, 210, 120]
      color_observed: "#FFD700"
      text_confidence: 0.95

  - id: agg-customer-delivery
    name: "Customer"
    group: grp-delivery
    notes: >
      Duplicate Customer aggregate in the Delivery zone. The delivery
      context needs customer name, address, phone number, and delivery
      instructions — a different view of the Customer from Orders.
    origin:
      source: src-001
      bbox: [3190, 540, 210, 120]
      color_observed: "#FFD700"
      text_confidence: 0.95

  - id: agg-order-delivery
    name: "Order"
    group: grp-delivery
    notes: >
      Duplicate Order aggregate in the Delivery zone. Joe discussed
      whether delivery needs order details: "you might want some of
      the order information for the delivery person, in case the
