    group: grp-orders
    notes: >
      Joe: "The very first thing that happens is you either come into
      the store or you go online and you request — order requested."
      No aggregate target shown inline (aggregates are floating at
      bottom of zone).
    origin:
      source: src-001
      bbox: [230, 160, 165, 105]
      color_observed: "#4FC3F7"
      text_confidence: 0.93

  - id: cmd-select-pizza-type
    name: "Select Pizza Type"
    sequence: 2
    initiated_by:
      actor: act-customer-top
    emits:
      - evt-type-of-pizzas-selected
    group: grp-orders
    notes: >
      Joe: "They're going to start entering in either pizza type...
      one or more pizza with the type or things they want." Could
      involve selection from predefined menu options.
    origin:
      source: src-001
      bbox: [380, 90, 155, 105]
      color_observed: "#4FC3F7"
      text_confidence: 0.93

  - id: cmd-enter-delivery-information
