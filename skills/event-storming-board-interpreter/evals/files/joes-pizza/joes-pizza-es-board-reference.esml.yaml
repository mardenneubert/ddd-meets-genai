      Represents the customer placing the online order.
    origin:
      source: src-001
      bbox: [380, 680, 210, 120]
      color_observed: "#FFD700"
      text_confidence: 0.96

  - id: agg-order-orders
    name: "Order"
    group: grp-orders
    notes: >
      Large yellow sticky at the bottom of the Orders zone, next to
