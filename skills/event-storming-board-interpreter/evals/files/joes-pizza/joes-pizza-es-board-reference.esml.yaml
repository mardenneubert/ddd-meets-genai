      phone number." Also includes delivery instructions ("leave it
      on the porch or ring this code").
    origin:
      source: src-001
      bbox: [385, 440, 165, 120]
      color_observed: "#4FC3F7"
      text_confidence: 0.91

  - id: cmd-enter-payment-information
