    origin:
      source: src-001
      bbox: [1830, 80, 155, 95]
      color_observed: "#4FC3F7"
      text_confidence: 0.92

  - id: cmd-pack-order
    name: "Pack Order"
    sequence: 12
    initiated_by:
      actor: act-kitchen-staff
    emits:
