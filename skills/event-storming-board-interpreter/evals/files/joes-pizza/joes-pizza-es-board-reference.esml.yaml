esml: "0.2.1"

board:
  title: "Joe's Pizza — Design Level Event Storming"
  variation: design_level
  date: "2025-09-06"
  facilitator: "Marden Neubert"
  participants:
    - "Joseph Yoder"
  notes: >
    Two-session Event Storming for Joe's Pizza Place, an online-only
    pizza delivery service in São Paulo. Session 1 covered big-picture
    events, commands, actors, and external systems. Session 2 added
    aggregates and discussed entity fields. The board is a Miro export.
    Aggregates are positioned at the bottom of each zone (floating),
    not inline in the canonical command→aggregate→event flow. Multiple
    instances of the same aggregate (Order, Customer) appear across
    zones, reflecting different bounded-context views of the same
    concept. Three pivotal events mark phase boundaries: Order Placed,
    Order Prepared & Packed, and Order Delivered.

sources:
  - id: src-001
    file: "joes-pizza-es-board.png"
    width_px: 4086
    height_px: 978

