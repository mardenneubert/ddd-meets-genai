    origin:
      source: src-001
      bbox: [1620, 160, 150, 95]
      color_observed: "#4FC3F7"
      text_confidence: 0.93

  - id: cmd-cook-pizza
    name: "Cook Pizza"
    sequence: 9
    initiated_by:
      actor: act-pizza-chef-oven
    emits:
