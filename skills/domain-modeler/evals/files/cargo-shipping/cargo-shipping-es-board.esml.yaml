esml: "0.2.1"

board:
  title: "Cargo Shipping Domain Event Storming Board"
  variation: design_level
  date: "2026-03-10"
  facilitator: "Anna Chen"
  participants:
    - "Marcus Webb"
    - "Sofia Petrova"
    - "James Okafor"
    - "Raj Patel"
  notes: "Transcribed from a single SVG board. The dashed zones are recorded as groups because ESML captures board structure, not downstream bounded-context interpretation."

sources:
  - id: src-001
    file: "cargo-shipping-es-board.svg"
    width_px: 3840
    height_px: 1200

groups:
  - id: grp-booking-context
    name: "Booking Context"
    description: "Dashed green zone label on the board."
    origin:
      source: src-001
      bbox: [50, 150, 1250, 1000]
      color_observed: "#2E8B57"
      text_confidence: 0.99
  - id: grp-tracking-context
    name: "Tracking Context"
    description: "Dashed blue zone label on the board."
    origin:
      source: src-001
      bbox: [1350, 150, 1050, 1000]
      color_observed: "#4169E1"
      text_confidence: 0.99
  - id: grp-voyage-context
    name: "Voyage Context"
    description: "Dashed purple zone label on the board."
    origin:
      source: src-001
      bbox: [2500, 150, 700, 500]
      color_observed: "#9370DB"
      text_confidence: 0.99
  - id: grp-location-reference-data
    name: "Location (Reference Data)"
    description: "Dashed gray zone label on the board."
    origin:
      source: src-001
      bbox: [2500, 700, 700, 450]
      color_observed: "#808080"
      text_confidence: 0.99

actors:
  - id: act-shipping-clerk
    name: "Shipping Clerk"
    group: grp-booking-context
    origin:
      source: src-001
      bbox: [100, 200, 100, 70]
      color_observed: "#FFF8DC"
      text_confidence: 0.99
  - id: act-port-operations
    name: "Port Operations"
    group: grp-tracking-context
    origin:
      source: src-001
      bbox: [1400, 200, 100, 70]
      color_observed: "#FFF8DC"
      text_confidence: 0.99
  - id: act-scheduling-dept
    name: "Scheduling Dept"
    group: grp-voyage-context
    origin:
      source: src-001
      bbox: [2550, 200, 100, 70]
      color_observed: "#FFF8DC"
      text_confidence: 0.99

events:
  - id: evt-cargo-booked
    name: "Cargo Booked"
    sequence: 2
    group: grp-booking-context
    origin:
      source: src-001
      bbox: [400, 200, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-cargo-routed
    name: "Cargo Routed"
    sequence: 3
    group: grp-booking-context
    origin:
      source: src-001
      bbox: [550, 330, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-destination-changed
    name: "Destination Changed"
    sequence: 4
    group: grp-booking-context
    origin:
      source: src-001
      bbox: [700, 330, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-cargo-received
    name: "Cargo Received"
    sequence: 6
    group: grp-tracking-context
    origin:
      source: src-001
      bbox: [1700, 200, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-cargo-loaded
    name: "Cargo Loaded"
    sequence: 6
    group: grp-tracking-context
    origin:
      source: src-001
      bbox: [1700, 330, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-cargo-unloaded
    name: "Cargo Unloaded"
    sequence: 6
    group: grp-tracking-context
    origin:
      source: src-001
      bbox: [1700, 500, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-customs-cleared
    name: "Customs Cleared"
    sequence: 6
    group: grp-tracking-context
    origin:
      source: src-001
      bbox: [1700, 670, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-cargo-claimed
    name: "Cargo Claimed"
    sequence: 7
    group: grp-tracking-context
    origin:
      source: src-001
      bbox: [1850, 200, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-voyage-scheduled
    name: "Voyage Scheduled"
    sequence: 8
    group: grp-voyage-context
    origin:
      source: src-001
      bbox: [2700, 330, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-voyage-delayed
    name: "Voyage Delayed"
    sequence: 8
    group: grp-voyage-context
    origin:
      source: src-001
      bbox: [2700, 500, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-cargo-misdirected
    name: "Cargo Misdirected"
    sequence: 2
    group: grp-booking-context
    notes: "Placed in the lower booking area near the delivery-derivation policy rather than on the top timeline."
    origin:
      source: src-001
      bbox: [400, 500, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99
  - id: evt-cargo-delivered
    name: "Cargo Delivered"
    sequence: 3
    group: grp-booking-context
    notes: "Placed in the lower booking area near the delivery-derivation policy rather than on the top timeline."
    origin:
      source: src-001
      bbox: [550, 500, 140, 90]
      color_observed: "#FF8C00"
      text_confidence: 0.99

commands:
  - id: cmd-book-cargo
    name: "Book Cargo"
    sequence: 1
    initiated_by:
      actor: act-shipping-clerk
    targets:
      aggregate: agg-cargo
    emits:
      - evt-cargo-booked
    group: grp-booking-context
    origin:
      source: src-001
      bbox: [250, 200, 140, 90]
      color_observed: "#4169E1"
      text_confidence: 0.99
  - id: cmd-assign-itinerary
    name: "Assign Itinerary"
    sequence: 3
    targets:
      aggregate: agg-cargo
    emits:
      - evt-cargo-routed
    group: grp-booking-context
    notes: "No actor sticky is placed next to this command on the board."
    origin:
      source: src-001
      bbox: [550, 200, 140, 90]
      color_observed: "#4169E1"
      text_confidence: 0.99
  - id: cmd-change-destination
    name: "Change Destination"
    sequence: 4
    targets:
      aggregate: agg-cargo
    emits:
      - evt-destination-changed
    group: grp-booking-context
    notes: "No actor sticky is placed next to this command on the board."
    origin:
      source: src-001
      bbox: [700, 200, 140, 90]
      color_observed: "#4169E1"
      text_confidence: 0.99
  - id: cmd-register-handling-event
    name: "Register Handling Event"
    sequence: 5
    initiated_by:
      actor: act-port-operations
    targets:
      aggregate: agg-handling-event
    emits:
      - evt-cargo-received
      - evt-cargo-loaded
      - evt-cargo-unloaded
      - evt-customs-cleared
      - evt-cargo-claimed
    group: grp-tracking-context
    notes: "One command sticky is shown to the left of a vertical stack of handling-event outcomes."
    origin:
      source: src-001
      bbox: [1550, 200, 140, 90]
      color_observed: "#4169E1"
      text_confidence: 0.99
  - id: cmd-schedule-voyage
    name: "Schedule Voyage"
    sequence: 8
    initiated_by:
      actor: act-scheduling-dept
    targets:
      aggregate: agg-voyage
    emits:
      - evt-voyage-scheduled
    group: grp-voyage-context
    origin:
      source: src-001
      bbox: [2700, 200, 140, 90]
      color_observed: "#4169E1"
      text_confidence: 0.99

aggregates:
  - id: agg-cargo
    name: "Cargo"
    receives:
      - cmd-book-cargo
      - cmd-assign-itinerary
      - cmd-change-destination
    produces:
      - evt-cargo-booked
      - evt-cargo-routed
      - evt-destination-changed
      - evt-cargo-misdirected
      - evt-cargo-delivered
    group: grp-booking-context
    notes: "A crossed-out correction note on the board changes 'Shipment' to 'Cargo'."
    origin:
      source: src-001
      bbox: [250, 330, 140, 110]
      color_observed: "#FFD700"
      text_confidence: 0.99
  - id: agg-handling-event
    name: "Handling Event"
    receives:
      - cmd-register-handling-event
    produces:
      - evt-cargo-received
      - evt-cargo-loaded
      - evt-cargo-unloaded
      - evt-customs-cleared
      - evt-cargo-claimed
    group: grp-tracking-context
    notes: "Placed to the right of the handling-event chain, indicating the aggregate for the recorded facts."
    origin:
      source: src-001
      bbox: [1850, 330, 140, 110]
      color_observed: "#FFD700"
      text_confidence: 0.99
  - id: agg-voyage
    name: "Voyage"
    receives:
      - cmd-schedule-voyage
    produces:
      - evt-voyage-scheduled
      - evt-voyage-delayed
    group: grp-voyage-context
    origin:
      source: src-001
      bbox: [2850, 330, 140, 110]
      color_observed: "#FFD700"
      text_confidence: 0.99

policies:
  - id: pol-when-cargo-handled-derive-delivery
    name: "When Cargo Handled Derive Delivery"
    rule: "When Cargo Handled, derive Delivery"
    group: grp-booking-context
    notes: "The sticky reads 'When Cargo Handled -> Derive Delivery'. 'Cargo Handled' appears only as an arrow label between zones, not as a sticky, so no `listens_to` relationship is encoded."
    origin:
      source: src-001
      bbox: [850, 500, 140, 90]
      color_observed: "#9370DB"
      text_confidence: 0.98

read_models:
  - id: rm-cargo-tracking-view
    name: "Cargo Tracking View"
    description: "Green read-model sticky labeled as a tracking view."
    group: grp-booking-context
    notes: "The board places this in the booking area near the delivery-derivation policy."
    origin:
      source: src-001
      bbox: [1000, 200, 140, 90]
      color_observed: "#3CB371"
      text_confidence: 0.99

external_systems:
  - id: sys-routing-engine
    name: "Routing Engine"
    group: grp-booking-context
    notes: "Placed near 'Assign Itinerary'. The board shows the system but does not draw a direct command target to it."
    origin:
      source: src-001
      bbox: [1000, 330, 140, 90]
      color_observed: "#F0F0F0"
      text_confidence: 0.99
  - id: sys-unlocode-port-registry
    name: "UN/LOCODE Port Registry"
    group: grp-location-reference-data
    origin:
      source: src-001
      bbox: [2550, 750, 140, 90]
      color_observed: "#F0F0F0"
      text_confidence: 0.99

hotspots:
  - id: hot-routing-engine-unavailable
    name: "What if routing engine is unavailable?"
    near:
      - sys-routing-engine
      - cmd-assign-itinerary
    group: grp-booking-context
    origin:
      source: src-001
      bbox: [1000, 500, 140, 90]
      color_observed: "#FF6B6B"
      text_confidence: 0.99
  - id: hot-partial-unloads
    name: "How do we handle partial unloads?"
    near:
      - evt-cargo-unloaded
      - agg-handling-event
    group: grp-tracking-context
    origin:
      source: src-001
      bbox: [2050, 500, 140, 90]
      color_observed: "#FF6B6B"
      text_confidence: 0.99
  - id: hot-location-external-service
    name: "Should Location be external service?"
    near:
      - sys-unlocode-port-registry
    group: grp-location-reference-data
    origin:
      source: src-001
      bbox: [2700, 850, 140, 90]
      color_observed: "#FF6B6B"
      text_confidence: 0.99

unresolved:
  - id: unresolved-001
    suspected_type: event
    text_raw: "Cargo Handled"
    notes: "Text appears as a label on the long connector arrow from the Tracking zone back toward the lower Booking-area policy. Under the updated skill rules, arrow labels are preserved as unresolved rather than promoted to events or policy triggers."
    origin:
      source: src-001
      bbox: [1465, 500, 120, 20]
      color_observed: "#666666"
      text_confidence: 0.99

confidence_defaults:
  overall_text_extraction: 0.99
  overall_classification: 0.96
  notes: "The source is a clean digital SVG rather than a photograph, so text extraction confidence is very high. Sequence values now follow physical x-position strictly, and the connector label 'Cargo Handled' is preserved as unresolved rather than modeled as a domain element."
